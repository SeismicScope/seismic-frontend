name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pages: write
  id-token: write

env:
  NODE_ENV: test

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install npm
        run: npm install -g npm@10.9.0

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  storybook:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install npm
        run: npm install -g npm@10.9.0

      - name: Install dependencies
        run: npm install

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static

  bundle-analysis:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SENTRY_IGNORE_API_TOKEN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install npm
        run: npm install -g npm@10.9.0

      - name: Install dependencies
        run: npm install

      - name: Build with Bundle Analyzer
        run: ANALYZE=true npm run build -- --webpack

      - name: Prepare reports
        run: |
          mkdir -p bundle-report
          cp .next/analyze/*.html ./bundle-report/ || true

      - name: Upload Bundle Report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: bundle-report

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install npm
        run: npm install -g npm@10.9.0

      - name: Install dependencies
        run: npm install

      - name: Dependency audit
        run: npm audit --audit-level=high

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [storybook, bundle-analysis]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Storybook
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: ./public/storybook

      - name: Download Bundle Report
        uses: actions/download-artifact@v4
        with:
          name: bundle-report
          path: ./public/bundle-analysis

      - name: Create index page
        run: bash ./scripts/generate-reports-index.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
